services:
  postgres:
    image: postgres:15
    container_name: cheko-postgres
    restart: always
    environment:
      POSTGRES_DB: cheko_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./cheko-backend
    container_name: cheko-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cheko_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  frontend:
    build: ./cheko-frontend
    container_name: cheko-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

  tileserver:
    build: ./mbtileserver
    container_name: cheko-tileserver
    restart: always
    ports:
      - "8090:8080"
    volumes:
      - ./data:/data

volumes:
  postgres_data: